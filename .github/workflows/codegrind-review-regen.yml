name: "CodeGrind Review: Regen & Set"

on:
  issue_comment:
    types: [created]

jobs:
  regen-or-set:
    if: >-
      github.event.issue.pull_request
      && (startsWith(github.event.comment.body, '/regen')
          || startsWith(github.event.comment.body, '/set'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    concurrency:
      group: codegrind-regen-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      # ── 1. Parse comment ──────────────────────────────────────────────
      - name: Parse comment command
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim();

            // Regen image
            let m = body.match(/^\/regen\s+image(?:\s*:\s*(.+))?$/i);
            if (m) {
              core.setOutput('valid', 'true');
              core.setOutput('command', 'regen');
              core.setOutput('target', 'image');
              core.setOutput('hint', m[1] || '');
              return;
            }

            // Set post field (title / excerpt)
            m = body.match(/^\/set\s+post\s+(title|excerpt)\s*:\s*(.+)$/i);
            if (m) {
              core.setOutput('valid', 'true');
              core.setOutput('command', 'set');
              core.setOutput('target', 'post-field');
              core.setOutput('field', m[1].toLowerCase());
              core.setOutput('value', m[2].trim());
              return;
            }

            // Set post replace
            m = body.match(/^\/set\s+post\s+replace\s*:\s*(.+?)\s*->\s*(.+)$/i);
            if (m) {
              core.setOutput('valid', 'true');
              core.setOutput('command', 'set');
              core.setOutput('target', 'post-replace');
              core.setOutput('old_text', m[1]);
              core.setOutput('new_text', m[2]);
              return;
            }

            // Set social
            m = body.match(/^\/set\s+social\s+(bluesky|linkedin)\s*:\s*(.+)$/is);
            if (m) {
              core.setOutput('valid', 'true');
              core.setOutput('command', 'set');
              core.setOutput('target', 'social');
              core.setOutput('platform', m[1].toLowerCase());
              core.setOutput('value', m[2].trim());
              return;
            }

            // Unknown command — post help
            core.setOutput('valid', 'false');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '**Unknown command.** Available commands:',
                '```',
                '/regen image',
                '/regen image: <hint>',
                '/set post title: <new title>',
                '/set post excerpt: <new excerpt>',
                '/set post replace: <old text> -> <new text>',
                '/set social bluesky: <full text>',
                '/set social linkedin: <full text>',
                '```'
              ].join('\n')
            });

      # ── 2. Validate PR context ────────────────────────────────────────
      - name: Validate PR context
        if: steps.parse.outputs.valid == 'true'
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const assoc = context.payload.comment.author_association;
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            if (!allowed.includes(assoc)) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'confused'
              });
              core.setFailed(`Unauthorized: author_association is ${assoc}`);
              return;
            }

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const branch = pr.head.ref;
            if (!branch.startsWith('codegrind-review-')) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'confused'
              });
              core.setFailed(`Not a codegrind review PR (branch: ${branch})`);
              return;
            }

            const rawStem = branch.replace(/^codegrind-review-/, '');
            // Allow only safe filename characters and disallow path traversal patterns
            const safeStemPattern = /^[A-Za-z0-9._-]+$/;
            if (!rawStem || !safeStemPattern.test(rawStem) || rawStem.includes('..')) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'confused'
              });
              core.setFailed(`Invalid branch stem derived from PR branch: ${branch}`);
              return;
            }

            const stem = rawStem;
            core.setOutput('branch', branch);
            core.setOutput('stem', stem);

            // Add eyes reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      # ── 3. Checkout PR branch ─────────────────────────────────────────
      - name: Checkout PR branch
        if: steps.parse.outputs.valid == 'true' && steps.validate.conclusion == 'success' && steps.validate.outputs.branch != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validate.outputs.branch }}
          token: ${{ github.token }}

      - name: Configure git
        if: steps.parse.outputs.valid == 'true' && steps.validate.conclusion == 'success' && steps.validate.outputs.branch != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── 4. Read existing files ─────────────────────────────────────────
      - name: Read existing files
        if: steps.parse.outputs.valid == 'true' && steps.validate.conclusion == 'success' && steps.validate.outputs.branch != ''
        id: read
        shell: bash
        env:
          STEM: ${{ steps.validate.outputs.stem }}
        run: |
          POST_FILE="_posts/codegrind/${STEM}.md"
          REVIEW_JSON=".github/codegrind-review/${STEM}.json"
          REVIEW_MD=".github/codegrind-review/${STEM}.md"
          IMAGE_FILE="assets/images/codegrind/${STEM}.png"

          # Verify post file exists
          if [[ ! -f "$POST_FILE" ]]; then
            echo "::error::Post file not found: $POST_FILE"
            exit 1
          fi

          # Extract frontmatter
          FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$POST_FILE" | sed '1d;$d')
          TITLE=$(echo "$FRONTMATTER" | sed -n 's/^title:\s*"\(.*\)"/\1/p')
          if [[ -z "$TITLE" ]]; then
            TITLE=$(echo "$FRONTMATTER" | sed -n 's/^title:\s*//p')
          fi
          EXCERPT=$(echo "$FRONTMATTER" | sed -n 's/^excerpt:\s*//p')

          echo "title<<EOFTITLE" >> "$GITHUB_OUTPUT"
          echo "$TITLE" >> "$GITHUB_OUTPUT"
          echo "EOFTITLE" >> "$GITHUB_OUTPUT"

          echo "excerpt<<EOFEXCERPT" >> "$GITHUB_OUTPUT"
          echo "$EXCERPT" >> "$GITHUB_OUTPUT"
          echo "EOFEXCERPT" >> "$GITHUB_OUTPUT"

          # Extract IMAGE_PROMPT line (line after the marker)
          IMAGE_PROMPT=""
          if grep -q '<!-- IMAGE_PROMPT -->' "$POST_FILE"; then
            IMAGE_PROMPT=$(grep -A1 '<!-- IMAGE_PROMPT -->' "$POST_FILE" | tail -1)
          fi
          echo "image_prompt<<EOFPROMPT" >> "$GITHUB_OUTPUT"
          echo "$IMAGE_PROMPT" >> "$GITHUB_OUTPUT"
          echo "EOFPROMPT" >> "$GITHUB_OUTPUT"

          # Extract body text (strip frontmatter, HTML, markdown syntax; first ~2000 chars)
          BODY=$(awk 'BEGIN{n=0} /^---$/{n++; next} n>=2' "$POST_FILE" | \
                 sed 's/<[^>]*>//g; s/^#\+\s*//; s/\*\*\|__//g; s/\*\|_//g; s/\[\([^]]*\)\]([^)]*)/\1/g' | \
                 head -c 2000)
          echo "body<<EOFBODY" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOFBODY" >> "$GITHUB_OUTPUT"

          # Read review JSON if it exists
          if [[ -f "$REVIEW_JSON" ]]; then
            echo "review_json_exists=true" >> "$GITHUB_OUTPUT"
            BLUESKY=$(jq -r '.social.bluesky_text // ""' "$REVIEW_JSON")
            LINKEDIN=$(jq -r '.social.linkedin_text // ""' "$REVIEW_JSON")
            echo "bluesky_text<<EOFBS" >> "$GITHUB_OUTPUT"
            echo "$BLUESKY" >> "$GITHUB_OUTPUT"
            echo "EOFBS" >> "$GITHUB_OUTPUT"
            echo "linkedin_text<<EOFLI" >> "$GITHUB_OUTPUT"
            echo "$LINKEDIN" >> "$GITHUB_OUTPUT"
            echo "EOFLI" >> "$GITHUB_OUTPUT"
          else
            echo "review_json_exists=false" >> "$GITHUB_OUTPUT"
          fi

          # Export file paths for later steps
          echo "post_file=$POST_FILE" >> "$GITHUB_OUTPUT"
          echo "review_json=$REVIEW_JSON" >> "$GITHUB_OUTPUT"
          echo "review_md=$REVIEW_MD" >> "$GITHUB_OUTPUT"
          echo "image_file=$IMAGE_FILE" >> "$GITHUB_OUTPUT"

      # ── 5. Regen image ────────────────────────────────────────────────
      - name: "Regen image: validate API key"
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.command == 'regen'
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: |
          if [[ -z "$POLLINATIONS_API_KEY" ]]; then
            echo "::error::POLLINATIONS_API_KEY secret is not set"
            exit 1
          fi
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${POLLINATIONS_API_KEY}" \
            "https://gen.pollinations.ai/account/key")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Pollinations API key validation failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: "Regen image: generate new prompt"
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.command == 'regen'
        id: img_prompt
        shell: bash
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          TITLE: ${{ steps.read.outputs.title }}
          EXCERPT: ${{ steps.read.outputs.excerpt }}
          BODY: ${{ steps.read.outputs.body }}
          OLD_PROMPT: ${{ steps.read.outputs.image_prompt }}
          HINT: ${{ steps.parse.outputs.hint }}
        run: |
          SYSTEM_MSG="You generate Pollinations-compatible hero image prompts for CodeGrind blog posts. Return ONLY the image prompt text, nothing else. The prompt must describe a 16:9 editorial hero image, reflect the article's subject matter, emphasize technical/product visuals over fantasy, and contain 'no text, no watermark'."

          USER_MSG="Article title: ${TITLE}
          Excerpt: ${EXCERPT}

          Article body (first ~2000 chars):
          ${BODY}"

          if [[ -n "$OLD_PROMPT" ]]; then
            USER_MSG="${USER_MSG}

          The previous image prompt was: ${OLD_PROMPT}"
          fi

          if [[ -n "$HINT" ]]; then
            USER_MSG="${USER_MSG}

          The reviewer wants: ${HINT}"
          else
            USER_MSG="${USER_MSG}

          Generate a fresh alternative that matches the article but takes a different visual approach."
          fi

          # Try primary model, then fallback
          NEW_PROMPT=""
          for MODEL in "openai" "openai-fast"; do
            PAYLOAD=$(jq -n \
              --arg sys "$SYSTEM_MSG" \
              --arg usr "$USER_MSG" \
              --arg model "$MODEL" \
              '{
                model: $model,
                messages: [
                  {role: "system", content: $sys},
                  {role: "user", content: $usr}
                ],
                temperature: 0.8,
                max_tokens: 200
              }')

            RESPONSE=$(curl -sS --max-time 60 \
              -H "Authorization: Bearer ${POLLINATIONS_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://gen.pollinations.ai/v1/chat/completions" 2>&1) || true

            NEW_PROMPT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null)

            if [[ -n "$NEW_PROMPT" ]]; then
              echo "Used model: $MODEL"
              break
            fi
            echo "Model $MODEL failed, trying next..."
          done

          if [[ -z "$NEW_PROMPT" ]]; then
            echo "::error::Failed to generate image prompt from all models"
            exit 1
          fi

          # Clean up prompt (remove quotes wrapping)
          NEW_PROMPT=$(echo "$NEW_PROMPT" | sed 's/^"//;s/"$//')

          echo "new_prompt<<EOFNEWPROMPT" >> "$GITHUB_OUTPUT"
          echo "$NEW_PROMPT" >> "$GITHUB_OUTPUT"
          echo "EOFNEWPROMPT" >> "$GITHUB_OUTPUT"

      - name: "Regen image: generate image"
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.command == 'regen'
        id: img_gen
        shell: bash
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          NEW_PROMPT: ${{ steps.img_prompt.outputs.new_prompt }}
          IMAGE_FILE: ${{ steps.read.outputs.image_file }}
        run: |
          mkdir -p "$(dirname "$IMAGE_FILE")"

          ENCODED_PROMPT=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.stdin.read().strip()))" <<< "$NEW_PROMPT")

          SUCCESS=false
          for MODEL in "flux" "flux-pro"; do
            URL="https://gen.pollinations.ai/image/${ENCODED_PROMPT}?width=1792&height=1024&nologo=true&model=${MODEL}"

            for ATTEMPT in 1 2 3; do
              echo "Attempt $ATTEMPT with model $MODEL..."
              HTTP_CODE=$(curl -sS -o "$IMAGE_FILE" -w "%{http_code}" \
                --max-time 120 \
                -H "Authorization: Bearer ${POLLINATIONS_API_KEY}" \
                "$URL") || HTTP_CODE="000"

              if [[ "$HTTP_CODE" == "200" ]]; then
                # Verify it's actually an image
                FILE_TYPE=$(file --mime-type -b "$IMAGE_FILE")
                if [[ "$FILE_TYPE" == image/* ]]; then
                  echo "Image generated successfully with model $MODEL"
                  SUCCESS=true
                  break 2
                else
                  echo "Response was not an image (${FILE_TYPE}), retrying..."
                fi
              else
                echo "HTTP $HTTP_CODE, retrying..."
              fi

              SLEEP=$((ATTEMPT * 5))
              sleep $SLEEP
            done
          done

          if [[ "$SUCCESS" != "true" ]]; then
            echo "::error::Failed to generate image after all retries"
            exit 1
          fi

      - name: "Regen image: update post prompt marker"
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.command == 'regen'
        shell: bash
        env:
          POST_FILE: ${{ steps.read.outputs.post_file }}
          NEW_PROMPT: ${{ steps.img_prompt.outputs.new_prompt }}
        run: |
          python3 -c "
          import sys, os
          post = sys.argv[1]
          prompt = sys.argv[2]
          lines = open(post).readlines()
          marker = '<!-- IMAGE_PROMPT -->'
          found = False
          out = []
          skip_next = False
          for line in lines:
              if skip_next:
                  out.append(prompt.rstrip() + '\n')
                  skip_next = False
                  continue
              out.append(line)
              if marker in line:
                  found = True
                  skip_next = True
          if not found:
              out.append('\n' + marker + '\n' + prompt.rstrip() + '\n')
          open(post, 'w').writelines(out)
          " "$POST_FILE" "$NEW_PROMPT"

      # ── 6. Set post field ──────────────────────────────────────────────
      - name: "Set post field"
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.target == 'post-field'
        id: set_field
        shell: bash
        env:
          POST_FILE: ${{ steps.read.outputs.post_file }}
          REVIEW_JSON: ${{ steps.read.outputs.review_json }}
          REVIEW_MD: ${{ steps.read.outputs.review_md }}
          FIELD: ${{ steps.parse.outputs.field }}
          VALUE: ${{ steps.parse.outputs.value }}
        run: |
          # Read current value for feedback
          FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$POST_FILE" | sed '1d;$d')
          if [[ "$FIELD" == "title" ]]; then
            OLD_VALUE=$(echo "$FRONTMATTER" | sed -n 's/^title:\s*"\(.*\)"/\1/p')
            if [[ -z "$OLD_VALUE" ]]; then
              OLD_VALUE=$(echo "$FRONTMATTER" | sed -n 's/^title:\s*//p')
            fi
          else
            OLD_VALUE=$(echo "$FRONTMATTER" | sed -n "s/^${FIELD}:\s*//p")
          fi

          echo "old_value<<EOFOLD" >> "$GITHUB_OUTPUT"
          echo "$OLD_VALUE" >> "$GITHUB_OUTPUT"
          echo "EOFOLD" >> "$GITHUB_OUTPUT"

          # Update frontmatter field in post (only within --- markers)
          python3 -c "
          import sys
          post, field, value = sys.argv[1], sys.argv[2], sys.argv[3]
          lines = open(post).readlines()

          # Find frontmatter block (between first two '---' lines)
          fm_start = None
          fm_end = None
          for i, line in enumerate(lines):
              if line.strip() == '---':
                  if fm_start is None:
                      fm_start = i
                  elif fm_end is None:
                      fm_end = i
                      break

          # Fail if no proper frontmatter block is found
          if fm_start is None or fm_end is None or fm_end <= fm_start:
              sys.exit(1)

          replaced = False
          # Only update within the frontmatter block
          for i in range(fm_start + 1, fm_end):
              if lines[i].startswith(field + ':'):
                  if field == 'title':
                      lines[i] = f'title: \"{value}\"\n'
                  else:
                      lines[i] = f'{field}: {value}\n'
                  replaced = True
                  break

          # Fail if the field was not found in frontmatter
          if not replaced:
              sys.exit(1)

          open(post, 'w').writelines(lines)
          " "$POST_FILE" "$FIELD" "$VALUE"

          # Update review JSON if it exists
          if [[ -f "$REVIEW_JSON" ]]; then
            if [[ "$FIELD" == "title" ]]; then
              jq --arg v "$VALUE" '.title = $v' "$REVIEW_JSON" > tmp.json && mv tmp.json "$REVIEW_JSON"
            elif [[ "$FIELD" == "excerpt" ]]; then
              jq --arg v "$VALUE" '.summary = $v' "$REVIEW_JSON" > tmp.json && mv tmp.json "$REVIEW_JSON"
            fi
          fi

          # Update review MD if it exists
          if [[ -f "$REVIEW_MD" ]]; then
            python3 -c "
          import sys
          md, field, value = sys.argv[1], sys.argv[2], sys.argv[3]
          lines = open(md).readlines()
          out = []
          for line in lines:
              if field == 'title' and line.startswith('## '):
                  out.append(f'## {value}\n')
              elif field == 'title' and line.startswith('**Title:**'):
                  out.append(f'**Title:** {value}\n')
              elif field == 'excerpt' and line.startswith('**Summary:**'):
                  out.append(f'**Summary:** {value}\n')
              else:
                  out.append(line)
          open(md, 'w').writelines(out)
            " "$REVIEW_MD" "$FIELD" "$VALUE"
          fi

      # ── 7. Set post replace ────────────────────────────────────────────
      - name: "Set post replace"
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.target == 'post-replace'
        id: set_replace
        shell: bash
        env:
          POST_FILE: ${{ steps.read.outputs.post_file }}
          OLD_TEXT: ${{ steps.parse.outputs.old_text }}
          NEW_TEXT: ${{ steps.parse.outputs.new_text }}
        run: |
          # Guard: reject immutable frontmatter field edits
          IMMUTABLE_KEYS="slug date layout canonical_url image author"
          for KEY in $IMMUTABLE_KEYS; do
            if echo "$OLD_TEXT" | grep -qP "^${KEY}:"; then
              echo "::error::Cannot modify immutable field '${KEY}' via replace. Use the CodeGrind workflow to regenerate."
              echo "rejected=true" >> "$GITHUB_OUTPUT"
              echo "reject_reason=Cannot modify immutable field '${KEY}'" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          done

          # Count occurrences
          COUNT=$(grep -cF "$OLD_TEXT" "$POST_FILE" || true)

          if [[ "$COUNT" -eq 0 ]]; then
            echo "::error::Text not found in post"
            echo "not_found=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "replace_count=$COUNT" >> "$GITHUB_OUTPUT"

          # Perform replacement (all occurrences) — use Python for character safety
          python3 -c "
          import sys
          post, old, new = sys.argv[1], sys.argv[2], sys.argv[3]
          content = open(post).read()
          content = content.replace(old, new)
          open(post, 'w').write(content)
          " "$POST_FILE" "$OLD_TEXT" "$NEW_TEXT"

      # ── 8. Set social ──────────────────────────────────────────────────
      - name: "Set social"
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.target == 'social'
        id: set_social
        shell: bash
        env:
          REVIEW_JSON: ${{ steps.read.outputs.review_json }}
          REVIEW_MD: ${{ steps.read.outputs.review_md }}
          PLATFORM: ${{ steps.parse.outputs.platform }}
          VALUE: ${{ steps.parse.outputs.value }}
        run: |
          if [[ ! -f "$REVIEW_JSON" ]]; then
            echo "::error::Review JSON not found: $REVIEW_JSON"
            exit 1
          fi

          # Validate length
          CHAR_COUNT=${#VALUE}
          if [[ "$PLATFORM" == "bluesky" && "$CHAR_COUNT" -gt 300 ]]; then
            echo "::error::Bluesky text exceeds 300 characters ($CHAR_COUNT chars)"
            echo "too_long=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [[ "$PLATFORM" == "linkedin" && "$CHAR_COUNT" -gt 1200 ]]; then
            echo "::error::LinkedIn text exceeds 1200 characters ($CHAR_COUNT chars)"
            echo "too_long=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "char_count=$CHAR_COUNT" >> "$GITHUB_OUTPUT"

          # Read old value for feedback
          if [[ "$PLATFORM" == "bluesky" ]]; then
            OLD_VALUE=$(jq -r '.social.bluesky_text // ""' "$REVIEW_JSON")
            jq --arg v "$VALUE" '.social.bluesky_text = $v' "$REVIEW_JSON" > tmp.json && mv tmp.json "$REVIEW_JSON"
          else
            OLD_VALUE=$(jq -r '.social.linkedin_text // ""' "$REVIEW_JSON")
            jq --arg v "$VALUE" '.social.linkedin_text = $v' "$REVIEW_JSON" > tmp.json && mv tmp.json "$REVIEW_JSON"
          fi

          echo "old_value<<EOFOLDSOCIAL" >> "$GITHUB_OUTPUT"
          echo "$OLD_VALUE" >> "$GITHUB_OUTPUT"
          echo "EOFOLDSOCIAL" >> "$GITHUB_OUTPUT"

          # Update review MD social section if it exists
          if [[ -f "$REVIEW_MD" ]]; then
            python3 -c "
          import sys
          md, platform, value = sys.argv[1], sys.argv[2], sys.argv[3]
          label = 'Bluesky' if platform == 'bluesky' else 'LinkedIn'
          prefix = f'**{label}:**'
          lines = open(md).readlines()
          out = []
          for line in lines:
              if line.startswith(prefix):
                  out.append(f'{prefix} {value}\n')
              else:
                  out.append(line)
          open(md, 'w').writelines(out)
            " "$REVIEW_MD" "$PLATFORM" "$VALUE"
          fi

      # ── 9. Commit and push ─────────────────────────────────────────────
      - name: Commit and push
        if: steps.parse.outputs.valid == 'true'
        id: commit
        shell: bash
        env:
          COMMAND: ${{ steps.parse.outputs.command }}
          TARGET: ${{ steps.parse.outputs.target }}
          FIELD: ${{ steps.parse.outputs.field }}
          PLATFORM: ${{ steps.parse.outputs.platform }}
        run: |
          # Build commit message
          if [[ "$COMMAND" == "regen" ]]; then
            MSG="blog(review): regen image"
          elif [[ "$TARGET" == "post-field" ]]; then
            MSG="blog(review): set ${FIELD}"
          elif [[ "$TARGET" == "post-replace" ]]; then
            MSG="blog(review): replace text"
          elif [[ "$TARGET" == "social" ]]; then
            MSG="blog(review): set social ${PLATFORM}"
          else
            MSG="blog(review): update"
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "$MSG"
            git push
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 10. Feedback: success ──────────────────────────────────────────
      - name: Post success feedback
        if: steps.parse.outputs.valid == 'true' && success()
        uses: actions/github-script@v7
        env:
          COMMAND: ${{ steps.parse.outputs.command }}
          TARGET: ${{ steps.parse.outputs.target }}
          FIELD: ${{ steps.parse.outputs.field }}
          PLATFORM: ${{ steps.parse.outputs.platform }}
          VALUE: ${{ steps.parse.outputs.value }}
          HINT: ${{ steps.parse.outputs.hint }}
          OLD_PROMPT: ${{ steps.read.outputs.image_prompt }}
          NEW_PROMPT: ${{ steps.img_prompt.outputs.new_prompt }}
          SET_FIELD_OLD: ${{ steps.set_field.outputs.old_value }}
          REPLACE_COUNT: ${{ steps.set_replace.outputs.replace_count }}
          OLD_TEXT: ${{ steps.parse.outputs.old_text }}
          NEW_TEXT: ${{ steps.parse.outputs.new_text }}
          SOCIAL_OLD: ${{ steps.set_social.outputs.old_value }}
          SOCIAL_CHARS: ${{ steps.set_social.outputs.char_count }}
          NO_CHANGES: ${{ steps.commit.outputs.no_changes }}
        with:
          script: |
            // Replace eyes with checkmark
            const reactions = await github.rest.reactions.listForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id
            });
            for (const r of reactions.data) {
              if (r.content === 'eyes') {
                await github.rest.reactions.deleteForIssueComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: context.payload.comment.id,
                  reaction_id: r.id
                });
              }
            }
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: process.env.NO_CHANGES === 'true' ? 'confused' : '+1'
            });

            // Build summary
            let lines = [];
            const cmd = process.env.COMMAND;
            const target = process.env.TARGET;

            if (process.env.NO_CHANGES === 'true') {
              lines.push('**No changes detected** — nothing was committed.');
            } else if (cmd === 'regen') {
              lines.push('**Image regenerated** ✅');
              if (process.env.OLD_PROMPT) {
                lines.push(`**Old prompt:** ${process.env.OLD_PROMPT}`);
              }
              lines.push(`**New prompt:** ${process.env.NEW_PROMPT}`);
              if (process.env.HINT) {
                lines.push(`**Hint used:** ${process.env.HINT}`);
              }
            } else if (target === 'post-field') {
              lines.push(`**Updated \`${process.env.FIELD}\`** ✅`);
              lines.push(`**Old:** ${process.env.SET_FIELD_OLD}`);
              lines.push(`**New:** ${process.env.VALUE}`);
            } else if (target === 'post-replace') {
              lines.push('**Text replaced** ✅');
              lines.push(`**Old:** ${process.env.OLD_TEXT}`);
              lines.push(`**New:** ${process.env.NEW_TEXT}`);
              lines.push(`**Occurrences:** ${process.env.REPLACE_COUNT}`);
            } else if (target === 'social') {
              const plat = process.env.PLATFORM;
              lines.push(`**Updated ${plat} social copy** ✅`);
              lines.push(`**Characters:** ${process.env.SOCIAL_CHARS}`);
              lines.push(`**New text:** ${process.env.VALUE}`);
            }

            if (lines.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: lines.join('\n')
              });
            }

      # ── 11. Feedback: failure ──────────────────────────────────────────
      - name: Post failure feedback
        if: steps.parse.outputs.valid == 'true' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Replace eyes with X
            const reactions = await github.rest.reactions.listForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id
            });
            for (const r of reactions.data) {
              if (r.content === 'eyes') {
                await github.rest.reactions.deleteForIssueComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: context.payload.comment.id,
                  reaction_id: r.id
                });
              }
            }
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '-1'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '**Command failed** ❌\nCheck the [workflow run](' +
                `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                ') for details.'
            });
